<!doctype html>
<html>
<head><meta charset="utf-8"><title>Mock ATM dialog</title><style>#dialog{display:none}</style></head>
<body>
  <button>Buy Mkt</button><button>Sell Mkt</button>
  <div style="display:flex;align-items:center;gap:8px">
    <span>ATM</span><button>...</button>
    <div id="atm-gear" data-testid="atm-settings-button" type="button" class="btn btn-info" onclick="document.getElementById('dialog').style.display='block'"><svg width="12" height="12"><circle cx="6" cy="6" r="5"></circle></svg></div>
    <button>DAY</button><button>GTC</button>
    <button id="day-gear" onclick="window.dayGearClicks=(window.dayGearClicks||0)+1"><svg width="12" height="12"><circle cx="6" cy="6" r="5"></circle></svg></button>
  </div>
  <div id="dialog" role="dialog">
    <h2>ATM Settings</h2>
    <div><span>Show in</span> <span>$ Value</span></div>
    <div><label>Take Profit</label> <input id="tp" type="number" value="150"></div>
    <div><label>Stop Loss</label> <input id="sl" type="number" value="100"></div>
    <button onclick="document.getElementById('dialog').style.display='none'">Save</button>
    <button onclick="document.getElementById('dialog').style.display='none'">Cancel</button>
  </div>
</body>
</html>
