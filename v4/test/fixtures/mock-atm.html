<!doctype html>
<html>
<head><meta charset="utf-8"><title>Mock ATM dialog</title><style>#dialog{display:none}</style></head>
<body>
  <button>Buy Mkt</button><button>Sell Mkt</button>
  <div style="display:flex;align-items:center;gap:8px">
    <span>ATM</span><button>...</button>
    <div id="atm-gear" data-testid="atm-settings-button" type="button" class="btn btn-info" onclick="document.getElementById('dialog').style.display='block'"><svg width="12" height="12"><circle cx="6" cy="6" r="5"></circle></svg></div>
    <button>DAY</button><button>GTC</button>
    <button id="day-gear" onclick="window.dayGearClicks=(window.dayGearClicks||0)+1"><svg width="12" height="12"><circle cx="6" cy="6" r="5"></circle></svg></button>
  </div>
  <div id="dialog" role="dialog">
    <h2>ATM Settings</h2>
    <div>
      <span>Show in</span>
      <div class="select-input"><div id="show-in" tabindex="0" onclick="document.getElementById('dollar-option').hidden=false"><span class="form-control">Ticks</span></div></div>
      <button id="dollar-option" hidden onclick="document.querySelector('#show-in .form-control').textContent='$ Value';this.hidden=true">$ Value</button>
    </div>
    <div id="bracket-grid" style="display:grid;grid-template-columns:140px 180px">
      <div style="display:grid;grid-template-rows:40px 40px"><label>Take Profit</label><label>Stop Loss</label></div>
      <div style="display:grid;grid-template-rows:40px 40px"><input id="tp" type="number" value="150"><input id="sl" type="number" value="100"></div>
    </div>
    <button onclick="saveAtm()">Save</button>
    <button onclick="document.getElementById('dialog').style.display='none'">Cancel</button>
  </div>
  <script>
    function saveAtm() {
      if (window.clampTarget) document.getElementById('tp').value = '1000';
      document.getElementById('dialog').style.display = 'none';
    }
  </script>
</body>
</html>
