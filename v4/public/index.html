<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>V4 Control Center</title><link rel="stylesheet" href="/style.css"></head>
<body><main class="control-center">
  <header><div><p class="eyebrow">MULTI-FIRM ORCHESTRATOR</p><h1>V4 Control Center</h1></div><div class="header-actions"><span id="overall" class="pill">Loading</span><a class="tag" href="/onboarding.html">Account onboarding</a></div></header>
  <section id="summary" class="summary-grid"></section>
  <section class="control-layout">
    <aside><div class="section-head"><h2>Login connections</h2><a href="/onboarding.html" class="small-link">+ Add login</a></div><div id="connections" class="connection-stack"></div></aside>
    <div><div class="section-head"><h2>Rotation pools</h2><button id="refresh-balances" type="button">Refresh balances</button></div><p class="muted">Manual changes to the selected account or ATM settings in Tradovate require clicking Make next again before the next signal.</p><div id="pool-list" class="pool-list-panels"></div></div>
  </section>
  <section><h2>Recent activity</h2><div id="events" class="event-list"></div></section>
  <p id="action-result" class="save-result"></p>
</main><script src="/app.js"></script></body></html>
