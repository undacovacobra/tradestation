<!doctype html>
<html><body>
<qty-ticket></qty-ticket>
<script>
// A stand-in for Tradovate's order ticket, built inside a shadow root (the
// thing that broke raw DOM scanning) with a quantity input + preset dropdown.
// ?readonly=1 makes the input non-typeable so tests exercise the dropdown path.
class QtyTicket extends HTMLElement {
  constructor(){
    super();
    const r = this.attachShadow({mode:'open'});
    const ro = new URLSearchParams(location.search).get('readonly') === '1';
    r.innerHTML = `
      <style>
        .row{display:flex;gap:8px;align-items:center;font:14px sans-serif;padding:20px}
        button{padding:6px 10px}
        .qty{position:relative}
        input{width:48px;padding:6px}
        .menu{position:absolute;top:34px;left:0;background:#222;color:#fff;width:60px;display:none;z-index:5}
        .menu div{padding:6px;cursor:pointer}
      </style>
      <div class="row">
        <button>Buy Mkt</button><button>Sell Mkt</button>
        <div class="qty">
          <input value="2" ${ro ? "readonly" : ""}>
          <div class="menu">${[1,2,3,4,5,10,15,20,25].map(n=>`<div>${n}</div>`).join('')}</div>
        </div>
        <button>Exit at Mkt & Cxl</button>
      </div>`;
    const input = r.querySelector('input');
    const menu = r.querySelector('.menu');
    input.addEventListener('click', () => { menu.style.display = 'block'; });
    menu.addEventListener('click', (e) => {
      if (e.target.parentElement === menu) { input.value = e.target.textContent; menu.style.display = 'none'; }
    });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') menu.style.display = 'none'; });
  }
}
customElements.define('qty-ticket', QtyTicket);
</script>
</body></html>
