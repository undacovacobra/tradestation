<!doctype html>
<html>
<head><meta charset="utf-8" /><title>Mock Tradovate ticket</title></head>
<body>
  <!-- Mirrors the REAL Tradovate order ticket the user calibrated against:
       the size box is a plain form-control input labelled "Select value" (NOT
       "Qty"), holding a whole number, next to the order buttons. There is also
       a symbol search box that must NOT be mistaken for the size box. -->
  <div id="topbar">ACCOUNT LFE05079261220006 EQUITY 50,000.00 USD</div>

  <input type="text" class="search-box--input" placeholder="Search symbol" />

  <div class="order-ticket">
    <input class="form-control" placeholder="Select value" value="1" />
    <button>Buy Mkt</button>
    <button>Sell Mkt</button>
    <button>Exit at Mkt &amp; Cxl</button>
  </div>
</body>
</html>
