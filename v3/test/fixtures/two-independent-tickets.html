<!doctype html>
<html><body>
  <section data-atlas-ticket="evals">
    <select data-atlas-account><option>E1</option><option>E2</option></select>
    <select data-atlas-atm><option>25</option><option>50</option></select>
    <input data-atlas-quantity value="1">
    <button data-atlas-buy>Buy Mkt</button><button data-atlas-sell>Sell Mkt</button><button data-atlas-exit>Exit at Mkt &amp; Cxl</button>
  </section>
  <section data-atlas-ticket="funded">
    <select data-atlas-account><option>F1</option><option>F2</option></select>
    <select data-atlas-atm><option>funded</option><option>funded-2</option></select>
    <input data-atlas-quantity value="2">
    <button data-atlas-buy>Buy Mkt</button><button data-atlas-sell>Sell Mkt</button><button data-atlas-exit>Exit at Mkt &amp; Cxl</button>
  </section>
  <script>
    for (const button of document.querySelectorAll("button")) button.addEventListener("click", () => {
      document.body.dataset.orderClicks = String(Number(document.body.dataset.orderClicks || 0) + 1);
      document.body.dataset.lastClick = button.closest("section").dataset.atlasTicket + ":" + button.getAttributeNames().find((n) => n.startsWith("data-atlas-"));
    });
  </script>
</body></html>
