<!doctype html>
<html>
<head><meta charset="utf-8" /><title>Mock ATM dropdown</title>
<style>[role="listbox"]{display:none}</style>
</head>
<body>
  <!-- "Buy Mkt" is the logged-in marker the bot checks for. -->
  <button>Buy Mkt</button>
  <button>Sell Mkt</button>

  <!-- The ATM strategy dropdown: a combobox next to the "ATM" label showing the
       current preset name. Clicking it reveals a listbox of preset options. -->
  <div>
    <span>ATM</span>
    <div id="atmbox" role="combobox" class="atm-select"
         onclick="document.getElementById('atmlist').style.display='block'">jj eval</div>
  </div>
  <div id="atmlist" role="listbox">
    <div role="option" onclick="pick('25')">25</div>
    <div role="option" onclick="pick('50')">50</div>
    <div role="option" onclick="pick('funded')">funded</div>
  </div>

  <script>
    function pick(name){
      document.getElementById('atmbox').textContent = name;
      document.getElementById('atmlist').style.display = 'none';
    }
  </script>
</body>
</html>
