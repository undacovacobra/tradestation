<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: sans-serif; }
    .ticket { width: 320px; border: 1px solid #999; padding: 12px; }
    .position-row { display: flex; gap: 12px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <section id="portfolio-decoy">
    <div>POSITION</div><span>99</span>
  </section>
  <script>
    const state = new URLSearchParams(location.search).get("state") || "flat";
    const value = state === "open-long" ? "+2" : state === "open-short" ? "-3" : state === "malformed" ? "0.00 USD" : "0";
    const positionLabel = state === "live-case" ? "Position" : "POSITION";
    const summaryOnly = state.startsWith("summary-");

    function topSummary(text, { hidden = false } = {}) {
      const root = document.createElement("section");
      root.className = hidden ? "hidden" : "";
      root.innerHTML = `<span class="positions-summary">${text}</span>`;
      document.body.append(root);
    }

    // The live Tradovate ticket wraps the count in <div class="number">, which
    // ALSO holds a smaller child span (e.g. an average price). "nested" states
    // reproduce that exact shape; the plain states keep the simpler flat spans.
    const nested = state.startsWith("nested");
    const nestedValue = state === "nested-long" ? "+2" : state === "nested-short" ? "-3" : "0";
    const liveOpenSpan = state === "live-open-span";
    const positionCell = liveOpenSpan
      ? `<div class="info-column"><small class="text-muted">Position</small><div class="number">@28814.00<span class="smaller text-danger">-10</span></div><div class="small text-success">420.00<span class="currency">USD</span></div></div>`
      : nested
      ? `<div class="info-column"><small class="text-muted">Position</small><div class="number">${nestedValue}<span class="smaller text-success">29178.50</span></div><div class="small">-.--<span class="currency">USD</span></div></div>`
      : state === "live-stacked"
        ? `<div class="position-row">${positionLabel}<span class="position-value">${value}</span><span>-.-- USD</span></div>`
      : `<div class="position-row"><span>${positionLabel}</span><span class="position-value">${value}</span><span>-.-- USD</span></div>`;

    function ticket({ hidden = false } = {}) {
      const root = document.createElement("section");
      root.className = `ticket${hidden ? " hidden" : ""}`;
      root.innerHTML = `
        <div class="market">MNQU6 <span>29945.00</span></div>
        <div class="open-pnl">OPEN P/L <span>0.00 USD</span></div>
        ${state === "missing" || (summaryOnly && state !== "summary-conflict") ? "" : positionCell}
        <div class="actions"><button>Buy Mkt</button><button>Sell Mkt</button></div>
        <input aria-label="Quantity" value="20">
        <button>Exit at Mkt &amp; Cxl</button>
      `;
      document.body.append(root);
    }

    if (state === "summary-flat") topSummary("Positions: + 0/- 0");
    else if (state === "summary-long") topSummary("Positions: + 2/- 0");
    else if (state === "summary-short") topSummary("Positions: + 0/- 3");
    else if (state === "summary-conflict") {
      topSummary("Positions: + 1/- 0");
      ticket();
    } else if (state === "summary-hidden") topSummary("Positions: + 0/- 0", { hidden: true });
    else if (state === "summary-malformed") topSummary("Positions: zero");
    else if (state === "summary-duplicate") {
      topSummary("Positions: + 0/- 0");
      topSummary("Positions: + 0/- 0");
    }

    if (state === "hidden") ticket({ hidden: true });
    else if (summaryOnly) {
      if (state === "summary-conflict") {
        // The conflicting ticket was created above.
      }
    }
    else {
      ticket();
      if (state === "duplicate") ticket();
    }
  </script>
</body>
</html>
